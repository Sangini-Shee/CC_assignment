<!DOCTYPE html>
<html>
<head>
<style>
body {
    background:#020617;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:sans-serif;
}
.box {
    background:#111;
    padding:30px;
    border-radius:10px;
    text-align:center;
}
input {
    margin:10px;
    padding:10px;
    border-radius:5px;
    border:none;
}
button {
    padding:10px;
    background:#38bdf8;
    border:none;
    border-radius:5px;
}
</style>
</head>
<body>

<div class="box">
<h2>Signup</h2>
<form method="post">
<input name="username"><br>
<input name="password" type="password"><br>
<button>Signup</button>
</form>
</div>

</body>
</html>
