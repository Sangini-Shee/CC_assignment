<!DOCTYPE html>
<html>
<head>
<style>
body {
    background:#020617;
    color:white;
    font-family:sans-serif;
    margin:0;
}

.header {
    text-align:center;
    padding:30px;
}

.note-card {
    background:#111;
    margin:20px auto;
    padding:20px;
    width:60%;
    border-radius:10px;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">
<h1>🚀 Notes</h1>

<form action="/create" method="post">
<button>Create</button>
</form>

<input id="search" placeholder="Search...">
</div>

{% for note in notes %}
<div class="note-card">

<input value="{{note.title}}" oninput="renameNote({{note.id}}, this.value)">
<p>{{note.last_updated}}</p>

<a href="/note/{{note.id}}">Open</a>

<form action="/delete/{{note.id}}" method="post">
<button>Delete</button>
</form>

</div>
{% endfor %}

<script>
function renameNote(id, title) {
fetch(`/rename/${id}`, {
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`title=${encodeURIComponent(title)}`
});
}

// ✅ FIXED SEARCH
document.getElementById("search").addEventListener("input", function(){
let val = this.value.toLowerCase();

document.querySelectorAll(".note-card").forEach(card => {
let text = card.innerText.toLowerCase();

card.style.display = text.includes(val) ? "block" : "none";
});
});
</script>

</body>
</html>
