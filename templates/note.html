<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: radial-gradient(circle at top, #0f172a, #020617);
    color: white;
    font-family: sans-serif;
    text-align: center;
}

.title {
    padding: 10px;
    border-radius: 8px;
    border: none;
    width: 300px;
    margin-bottom: 15px;
}

textarea {
    width: 80%;
    height: 450px;
    border-radius: 12px;
    border: none;
    padding: 15px;
    background: rgba(255,255,255,0.1);
    color: white;
}

.download {
    margin-top: 20px;
    display: inline-block;
    color: #38bdf8;
}
</style>
</head>

<body>

<h2>📝 Editor</h2>

<input id="title" class="title">

<br>

<textarea id="editor"></textarea>

<br>

<a id="download" class="download">Download</a>

<script>
const noteId = {{note_id}};
let lastContent="";

document.getElementById("download").href=`/export/${noteId}`;

setInterval(()=>{
fetch(`/get_note/${noteId}`)
.then(res=>res.json())
.then(data=>{
if(data.content!==lastContent){
editor.value=data.content;
title.value=data.title;
lastContent=data.content;
}
});
},2000);

editor.addEventListener("input",()=>{
fetch(`/update_note/${noteId}`,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`content=${encodeURIComponent(editor.value)}`
});
});

title.addEventListener("input",()=>{
fetch(`/rename/${noteId}`,{
method:"POST",
headers:{"Content-Type":"application/x-www-form-urlencoded"},
body:`title=${encodeURIComponent(title.value)}`
});
});
</script>

</body>
</html>
