<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: radial-gradient(circle, #0f172a, #020617);
    color: white;
    font-family: 'Segoe UI';
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 30px;
    border-radius: 15px;
    text-align: center;
    width: 300px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 10px 20px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

a { color: #38bdf8; }
</style>
</head>

<body>
<div class="box">
<h2>Login</h2>
<form method="post">
<input name="username" placeholder="Username">
<input name="password" type="password" placeholder="Password">
<br>
<button>Login</button>
</form>
<br>
<a href="/signup">Signup</a>
</div>
</body>
</html>
