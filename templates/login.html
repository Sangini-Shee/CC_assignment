<!DOCTYPE html>
<html>
<head>
<style>
body {background:#020617;color:white;display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;}
.box {background:#111;padding:30px;border-radius:10px;text-align:center;}
input {margin:10px;padding:10px;border-radius:5px;border:none;}
button {padding:10px;background:#38bdf8;border:none;border-radius:5px;}
</style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<form method="post">
<input name="username" placeholder="Username"><br>
<input name="password" type="password" placeholder="Password"><br>
<button>Login</button>
</form>
<a href="/signup">Signup</a>
</div>
</body>
</html>
